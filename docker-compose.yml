version: "3.9"

services:
  # Main AI Operating System service
  aios:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aios-core
    restart: unless-stopped
    ports:
      - "${AIOS_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - AIOS_HOST=0.0.0.0
      - AIOS_PORT=8080
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///data/aios.db
    volumes:
      - aios-data:/app/data
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aios-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Redis for message bus and caching
  redis:
    image: redis:7-alpine
    container_name: aios-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - aios-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for persistent storage (optional)
  postgres:
    image: postgres:16-alpine
    container_name: aios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aios
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aios-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aios}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monitoring with Prometheus + Grafana (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: aios-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aios-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: aios-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - aios-network
    profiles:
      - monitoring

volumes:
  aios-data:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  aios-network:
    driver: bridge
