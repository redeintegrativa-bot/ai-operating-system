# logrotate.conf - Log rotation for backup service
#
# Usage:
#   sudo logrotate -f /root/ai-operating-system/config/logrotate.conf
#   sudo logrotate /root/ai-operating-system/config/logrotate.conf  (dry run)
#
# To install as a daily cron job:
#   sudo ln -s /root/ai-operating-system/config/logrotate.conf /etc/logrotate.d/backup-service
#

/root/ai-operating-system/logs/backup.log {
    # Rotate daily
    daily

    # Keep 30 days of history
    rotate 30

    # Compress old logs with gzip
    compress
    delaycompress

    # Don't error if log file is missing
    missingok

    # Don't rotate empty log files
    notifempty

    # Create new log file with specified permissions after rotation
    create 0644 root root

    # Date extension for rotated files
    dateext
    dateformat -%Y%m%d

    # Use tab as delimiter in rotated filename
    tabooext +

    # Post-rotation script: create new log file and signal backup process
    postrotate
        touch /root/ai-operating-system/logs/backup.log
        chmod 0644 /root/ai-operating-system/logs/backup.log
        # Optionally send SIGHUP to restart log file handles
        # kill -HUP $(cat /root/ai-operating-system/logs/auto_backup.pid 2>/dev/null) 2>/dev/null || true
    endscript

    # Shared scripts run once for all logs in this block
    sharedscripts
}
