<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AIOS Dashboard - Central command interface for AI Operating System">
  <title>AIOS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation"></aside>
    <div class="main-wrapper">
      <header id="topbar" class="topbar" role="banner"></header>
      <main id="content" class="content" role="main" aria-label="Page content"></main>
    </div>
  </div>
  <div id="modal-container"></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <div id="search-overlay" class="search-overlay hidden" role="dialog" aria-label="Search">
    <div class="search-modal">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" class="search-input" placeholder="Buscar agentes, tarefas, memórias..." aria-label="Search">
        <kbd class="search-kbd">ESC</kbd>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/topbar.js"></script>
  <script src="js/components/card.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/kanban.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="pages/login.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/capability.js"></script>
  <script src="pages/agents.js"></script>
  <script src="pages/skills.js"></script>
  <script src="pages/plugins.js"></script>
  <script src="pages/memory.js"></script>
  <script src="pages/tasks.js"></script>
  <script src="pages/logs.js"></script>
  <script src="pages/settings.js"></script>
  <script src="pages/status.js"></script>
  <script src="pages/workspaces.js"></script>
  <script src="pages/missions.js"></script>
  <script src="pages/kanban.js"></script>
  <script src="pages/tools.js"></script>
  <script src="pages/marketplace.js"></script>
  <script src="pages/finances.js"></script>
  <script src="pages/analytics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
